<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li aria-current="page" class="breadcrumb-item active">Utenti</li>
    </ol>
</nav>

<mat-card class="trinta-card to-do-list-card mb-10 bg-white border-none d-block filters">
    <mat-card-content>
        <form [formGroup]="filterForm" (ngSubmit)="applyFilters()">
            <div class="container">
                <div class="row">
                    <div class="col-lg-8">
                        <mat-form-field>
                            <i-feather name="search"></i-feather>
                            <mat-label>Nome, cognome o codice fiscale</mat-label>
                            <input matInput formControlName="search" placeholder="Cerca utente">
                        </mat-form-field>
                    </div>
                    <div class="col-lg-2">
                        <button mat-button type="submit" class="action-filter">Filtra</button>
                    </div>
                    <div class="col-lg-2">
                        <button mat-button type="button" class="action-cancel" (click)="resetFilters()">Mostra tutti</button>
                    </div>
                </div>
            </div>
        </form>
    </mat-card-content>
</mat-card>

<mat-card class="trinta-card to-do-list-card mb-25 bg-white border-none d-block">
    <mat-card-content>
        <div class="to-do-list-table">
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource">
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">Nome</th>
                        <td mat-cell *matCellDef="let element" class="pl-0">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">{{element.name}}</h6>
                            </div>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="email">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">Email</th>
                        <td mat-cell *matCellDef="let element" class="pl-0">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">{{element.email}}</h6>
                            </div>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="role">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">Ruolo</th>
                        <td mat-cell *matCellDef="let element" class="pl-0">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">{{element.role}}</h6>
                            </div>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="phone">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">Telefono</th>
                        <td mat-cell *matCellDef="let element" class="pl-0">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">{{element.phone || '-'}}</h6>
                            </div>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="taxCode">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">Codice fiscale</th>
                        <td mat-cell *matCellDef="let element" class="pl-0">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">{{element.taxCode || '-'}}</h6>
                            </div>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="status">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">Stato</th>
                        <td mat-cell *matCellDef="let element" class="pl-0">
                            <span class="status-badge" [class.inactive]="element.isActive === false">
                                {{getStatusLabel(element)}}
                            </span>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="toggle">
                        <th mat-header-cell *matHeaderCellDef class="text-center pr-0">Attiva</th>
                        <td mat-cell *matCellDef="let element" class="text-center pr-0">
                            <div class="action">
                                <button *ngIf="canManageUser(element)" type="button" mat-button class="table-action-button action-warning" (click)="ToggleActive(element)">
                                    <i class="{{element.action.toggle}}"></i>
                                </button>
                                <h6 *ngIf="!canManageUser(element)" class="mt-0 mb-0">-</h6>
                            </div>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="delete">
                        <th mat-header-cell *matHeaderCellDef class="text-center pr-0">Elimina</th>
                        <td mat-cell *matCellDef="let element" class="text-center pr-0">
                            <div class="action">
                                <button *ngIf="canManageUser(element)" type="button" mat-button class="table-action-button action-delete" (click)="DeleteItem(element)">
                                    <i class="{{element.action.delete}}"></i>
                                </button>
                                <h6 *ngIf="!canManageUser(element)" class="mt-0 mb-0">-</h6>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                    <tr class="mat-row" *matNoDataRow>
                        <td class="mat-cell text-center no-data" [attr.colspan]="displayedColumns.length">
                            Nessun utente trovato
                        </td>
                    </tr>
                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[20, 50, 100]"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
